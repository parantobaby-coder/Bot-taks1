<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Craft - Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #334155; }
        .section { display: none; padding: 20px; padding-bottom: 80px; }
        .active-section { display: block; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .banner-slider { width: 100%; height: 150px; overflow: hidden; border-radius: 10px; position: relative; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: 0.5s; }
        .spin-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<!-- Loader -->
<div id="loader">
    <img src="https://via.placeholder.com/100" id="app-logo" class="w-24 h-24 mb-4 rounded-full">
    <h1 class="text-xl font-bold">Task Craft</h1>
    <div class="mt-4 animate-spin rounded-full h-8 w-8 border-t-2 border-blue-500"></div>
</div>

<!-- Header -->
<div class="flex justify-between items-center p-4 bg-slate-800 sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <img id="user-pfp" src="" class="w-10 h-10 rounded-full bg-gray-500">
        <div>
            <p id="user-name" class="text-sm font-bold">Loading...</p>
            <p id="user-id" class="text-xs text-gray-400">ID: ---</p>
        </div>
    </div>
    <div class="bg-yellow-500 px-3 py-1 rounded-full text-black font-bold">
        ৳ <span id="balance">0.00</span>
    </div>
</div>

<!-- Main Sections -->
<main>
    <!-- HOME SECTION -->
    <section id="home" class="section active-section">
        <div class="banner-slider mb-4">
            <img src="https://via.placeholder.com/400x150/ff7f50" class="banner-img">
            <img src="https://via.placeholder.com/400x150/87cefa" class="banner-img" style="display:none">
            <img src="https://via.placeholder.com/400x150/32cd32" class="banner-img" style="display:none">
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <button onclick="showSpin()" class="spin-btn bg-gradient-to-r from-purple-500 to-pink-500 p-4 rounded-xl font-bold">🎡 Lucky Spin</button>
            <button onclick="window.open('https://t.me/your_group')" class="bg-blue-600 p-4 rounded-xl font-bold flex items-center justify-center gap-2">
                <i class="fab fa-telegram"></i> Join Group
            </button>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl mb-4">
            <marquee id="notice-line">স্বাগতম Task Craft-এ! কাজ করুন আর আয় করুন প্রতিদিন।</marquee>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-slate-800 p-3 rounded-lg text-center">
                <p class="text-gray-400 text-xs">Total Balance</p>
                <p class="font-bold text-lg">৳ <span id="stat-balance">0</span></p>
            </div>
            <div class="bg-slate-800 p-3 rounded-lg text-center">
                <p class="text-gray-400 text-xs">Total Withdraw</p>
                <p class="font-bold text-lg">৳ <span id="stat-withdraw">0</span></p>
            </div>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl mb-4">
            <p class="text-sm mb-2">Referral Link:</p>
            <div class="flex gap-2">
                <input id="ref-link" readonly class="bg-slate-900 p-2 rounded w-full text-xs" value="https://t.me/botname?start=123">
                <button onclick="copyRef()" class="bg-green-500 px-4 py-2 rounded text-sm font-bold">Copy</button>
            </div>
        </div>
    </section>

    <!-- TASK SECTION -->
    <section id="task" class="section">
        <h2 class="text-xl font-bold mb-4">Daily Tasks</h2>
        <div id="task-list" class="space-y-4">
            <!-- Tasks will be loaded here -->
        </div>
    </section>

    <!-- TEAM SECTION -->
    <section id="team" class="section">
        <h2 class="text-xl font-bold mb-4">My Team</h2>
        <div id="team-list" class="space-y-2">
            <!-- Referrals will be loaded here -->
        </div>
    </section>

    <!-- LEADERBOARD -->
    <section id="leaderboard" class="section">
        <h2 class="text-xl font-bold mb-4">Top 50 Leaders</h2>
        <div id="leader-list" class="space-y-2"></div>
    </section>

    <!-- WITHDRAW -->
    <section id="withdraw" class="section">
        <h2 class="text-xl font-bold mb-4">Withdraw</h2>
        <div class="bg-slate-800 p-4 rounded-xl mb-4">
            <select id="method" class="w-full bg-slate-900 p-3 rounded-lg mb-4">
                <option value="Bkash">Bkash</option>
                <option value="Nagad">Nagad</option>
            </select>
            <input id="wd-number" type="number" placeholder="Number" class="w-full bg-slate-900 p-3 rounded-lg mb-4">
            <input id="wd-amount" type="number" placeholder="Amount" class="w-full bg-slate-900 p-3 rounded-lg mb-4">
            <button onclick="submitWithdraw()" class="w-full bg-orange-500 p-3 rounded-lg font-bold">Submit Withdraw</button>
        </div>
        <h3 class="font-bold mb-2">History</h3>
        <div id="withdraw-history" class="text-sm space-y-2"></div>
    </section>
</main>

<!-- Footer Navigation -->
<nav class="footer-nav">
    <button onclick="showSection('home')" class="text-center text-gray-400 hover:text-white"><i class="fas fa-home"></i><p class="text-[10px]">Home</p></button>
    <button onclick="showSection('task')" class="text-center text-gray-400 hover:text-white"><i class="fas fa-tasks"></i><p class="text-[10px]">Task</p></button>
    <button onclick="showSection('team')" class="text-center text-gray-400 hover:text-white"><i class="fas fa-users"></i><p class="text-[10px]">Team</p></button>
    <button onclick="showSection('leaderboard')" class="text-center text-gray-400 hover:text-white"><i class="fas fa-trophy"></i><p class="text-[10px]">Leader</p></button>
    <button onclick="showSection('withdraw')" class="text-center text-gray-400 hover:text-white"><i class="fas fa-wallet"></i><p class="text-[10px]">Withdraw</p></button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCQ2JiQpZEzF-5mKRyEkTI9um8VqtxmAsY",
        authDomain: "ornob-86a1c.firebaseapp.com",
        databaseURL: "https://ornob-86a1c-default-rtdb.firebaseio.com",
        projectId: "ornob-86a1c",
        storageBucket: "ornob-86a1c.firebasestorage.app",
        messagingSenderId: "210671147320",
        appId: "1:210671147320:web:892030b855bc44aaa509cd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tg = window.Telegram.WebApp;
    tg.expand();

    const userData = tg.initDataUnsafe.user || { id: "123456", first_name: "Test User" };
    const userId = userData.id.toString();

    // Initialize User Data
    async function initUser() {
        const userRef = ref(db, 'users/' + userId);
        const snapshot = await get(userRef);
        
        if (!snapshot.exists()) {
            await set(userRef, {
                name: userData.first_name,
                id: userId,
                balance: 0,
                withdraw: 0,
                referBy: tg.initDataUnsafe.start_param || "none",
                tasksCompleted: {},
                lastReset: new Date().toLocaleDateString()
            });
        }
        
        // Hide Loader
        document.getElementById('loader').style.display = 'none';
        
        // Join Popup
        Swal.fire({
            title: 'Join Our Channel!',
            text: 'আমাদের টেলিগ্রাম চ্যানেলে জয়েন হয়ে আপডেট থাকুন।',
            icon: 'info',
            confirmButtonText: 'Join Now'
        }).then(() => { window.open('https://t.me/yourchannel'); });

        loadData();
    }

    function loadData() {
        onValue(ref(db, 'users/' + userId), (snap) => {
            const data = snap.val();
            document.getElementById('user-name').innerText = data.name;
            document.getElementById('user-id').innerText = "ID: " + data.id;
            document.getElementById('balance').innerText = data.balance.toFixed(2);
            document.getElementById('stat-balance').innerText = data.balance.toFixed(2);
            document.getElementById('stat-withdraw').innerText = data.withdraw.toFixed(2);
            document.getElementById('ref-link').value = `https://t.me/TaskCraftBot?start=${userId}`;
        });
    }

    window.showSection = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
    };

    window.showSpin = () => {
        // Monetag Ad Logic
        const script = document.createElement('script');
        script.src = '//libtl.com/sdk.js';
        script.dataset.zone = '10992195';
        script.dataset.sdk = 'show_10992195';
        document.body.appendChild(script);

        Swal.fire({
            title: 'Spin Wheel',
            html: '<div class="w-48 h-48 border-4 border-dashed rounded-full mx-auto animate-spin flex items-center justify-center">🎡</div>',
            confirmButtonText: 'Spin Now'
        }).then(() => {
            // Logic to add random money
            const win = (Math.random() * 2).toFixed(2);
            update(ref(db, 'users/' + userId), {
                balance: parseFloat(document.getElementById('balance').innerText) + parseFloat(win)
            });
            Swal.fire('Success!', `আপনি জিতেছেন ৳${win}`, 'success');
        });
    };

    // Initialize
    initUser();
</script>

<script>
    // Banner Slider
    let currentBanner = 0;
    const banners = document.querySelectorAll('.banner-img');
    setInterval(() => {
        banners[currentBanner].style.display = 'none';
        currentBanner = (currentBanner + 1) % banners.length;
        banners[currentBanner].style.display = 'block';
    }, 3000);
</script>
</body>
  </html>
